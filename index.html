<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#faf8f4;--surface:#fff;--surface2:#f3f0ea;
      --border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);
      --text:#1a1a18;--text-muted:#6b6860;--text-faint:#a8a49c;
      --accent:#c8622a;--accent-bg:#fdf0e8;
      --success:#2d6a4f;--success-bg:#e8f5ee;
      --info:#1a5c96;--info-bg:#e8f0fb;
      --radius:12px;--radius-sm:8px
    }
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
    #pin-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;gap:2rem;text-align:center}
    .pin-eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint)}
    .pin-title{font-family:'Lora',serif;font-size:28px;font-weight:600;line-height:1.3}
    .pin-sub{font-size:14px;color:var(--text-muted);margin-top:4px}
    .pin-dots{display:flex;gap:14px}
    .pin-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border-strong);background:transparent;transition:background .15s,border-color .15s}
    .pin-dot.filled{background:var(--accent);border-color:var(--accent)}
    .pin-keypad{display:grid;grid-template-columns:repeat(3,68px);gap:10px}
    .key{width:68px;height:68px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-family:'Lora',serif;font-size:22px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s,transform .08s}
    .key:hover{background:var(--surface2)}.key:active{transform:scale(.95)}
    .key.small{font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text-muted)}
    .pin-error{font-size:13px;color:var(--accent);min-height:18px;font-weight:500}
    #hunt-screen{display:none;max-width:520px;margin:0 auto;padding:1.5rem 1rem 5rem}
    .hunt-top{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
    .stop-badge{font-size:12px;font-weight:500;color:var(--text-muted);background:var(--surface2);border-radius:20px;padding:4px 12px;border:1px solid var(--border);white-space:nowrap}
    .progress-wrap{flex:1}.progress-bg{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
    .pips{display:flex;gap:5px;margin-bottom:1.5rem;flex-wrap:wrap}
    .pip{width:7px;height:7px;border-radius:50%;background:var(--border);border:1px solid var(--border-strong);transition:background .3s}
    .pip.done{background:var(--accent);border-color:var(--accent)}.pip.active{background:var(--text-muted);border-color:var(--text-muted)}
    #map{width:100%;height:220px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:.75rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem}
    .card-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.5rem}
    .clue-text{font-family:'Lora',serif;font-size:15px;line-height:1.85;white-space:pre-line}
    .directions-card{background:var(--info-bg);border:1px solid rgba(26,92,150,.15);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.75rem}
    .directions-card .card-label{color:var(--info)}
    .directions-text{font-size:14px;color:var(--text);line-height:1.6}
    .directions-link{display:inline-block;margin-top:.5rem;font-size:13px;font-weight:500;color:var(--info);text-decoration:underline}
    .geo-status{font-size:13px;color:var(--text-muted);text-align:center;padding:.6rem 1rem;border-radius:var(--radius-sm);margin-bottom:.75rem;background:var(--surface2)}
    .geo-status.close{color:var(--success);font-weight:500;background:var(--success-bg)}
    .geo-status.err{color:var(--accent);background:var(--accent-bg)}
    .reveal-section{display:none}.reveal-section.visible{display:block;animation:fadeUp .4s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .arrival-banner{background:var(--success-bg);border:1px solid rgba(45,106,79,.25);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:.75rem}
    .arrival-banner .arr-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--success);margin-bottom:.3rem;opacity:.8}
    .arrival-banner .arr-name{font-family:'Lora',serif;font-size:20px;font-weight:600}
    .task-card{background:var(--accent-bg);border:1px solid rgba(200,98,42,.2);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem}
    .task-card .card-label{color:var(--accent);opacity:.8}
    .task-text{font-size:15px;line-height:1.65}
    .next-clue-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem}
    .fork-card{background:var(--info-bg);border:1px solid rgba(26,92,150,.2);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem}
    .fork-card .card-label{color:var(--info)}
    .fork-title{font-family:'Lora',serif;font-size:17px;font-weight:600;margin-bottom:.75rem}
    .fork-btns{display:flex;flex-direction:column;gap:10px}
    .fork-btn{width:100%;padding:13px 16px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text);cursor:pointer;text-align:left;transition:background .1s}
    .fork-btn:hover{background:var(--surface2)}
    .fork-desc{display:block;font-size:12px;font-weight:400;color:var(--text-muted);margin-top:3px}
    .optional-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem}
    .optional-card .card-label{color:var(--text-muted)}
    .optional-title{font-family:'Lora',serif;font-size:16px;font-weight:600;margin-bottom:.4rem}
    .optional-desc{font-size:14px;color:var(--text-muted);margin-bottom:.75rem;line-height:1.5}
    .optional-btns{display:flex;gap:10px}
    .opt-btn{flex:1;padding:11px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text);cursor:pointer;transition:background .1s}
    .opt-btn:hover{background:var(--accent-bg)}
    .next-btn{width:100%;padding:14px;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--text);color:var(--bg);font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:.25rem;transition:opacity .15s,transform .1s}
    .next-btn:hover{opacity:.85}.next-btn:active{transform:scale(.98)}
    .manual-link{text-align:center;margin-top:.75rem}
    .manual-link button{background:none;border:none;font-size:13px;color:var(--text-faint);cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline}
    .fm-unavail{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.75rem;font-size:14px;color:var(--text-muted)}
    .finish{text-align:center;padding:2rem 1rem}
    .finish .emoji-row{font-size:28px;margin-bottom:1rem;letter-spacing:6px}
    .finish h2{font-family:'Lora',serif;font-size:26px;font-weight:600;margin-bottom:.75rem}
    .finish p{font-size:15px;color:var(--text-muted);line-height:1.7;max-width:320px;margin:0 auto}
    @media(max-width:400px){.pin-keypad{grid-template-columns:repeat(3,60px)}.key{width:60px;height:60px}}
  </style>
</head>

</div>

  {id:'worn_short',name:"Worn Again Thrift",lat:48.7497213,lng:-122.4788525,

let pin='',stops=[],current=0,unlocked=false,watchId=null,map=null,userMarker=null;

function isFMOpen(){const n=new Date(),d=n.getDay(),t=n.getHours()*60+n.getMinutes();return d===6&&t>=600&&t<840;}

function pressKey(k){
  const err=document.getElementById('pin-error');err.textContent='';
  if(k==='clear')pin='';else if(k==='back')pin=pin.slice(0,-1);else if(pin.length<4)pin+=k;
  updateDots();
  if(pin.length===4){
    if(pin===PIN){
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('hunt-screen').style.display='block';
      stops=[...BASE];renderStop();
    }else{err.textContent='Wrong PIN — try again.';pin='';setTimeout(updateDots,0);}
  }
}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<pin.length);}

function renderStop(){
  const s=stops[current],total=stops.length;
  unlocked=false;
  document.getElementById('stop-label').textContent='Stop '+(current+1)+' of '+total;
  document.getElementById('progress-fill').style.width=(Math.round((current+1)/total*100))+'%';
  document.getElementById('pips').innerHTML=stops.map((_,i)=>'<div class="pip '+(i<current?'done':i===current?'active':'')+'"></div>').join('');

  let h='<div id="map"></div>';
  if(s.clue)h+='<div class="card"><div class="card-label">Your clue</div><div class="clue-text">'+s.clue.replace(/\n/g,'<br>')+'</div></div>';
  if(s.bikeHint&&s.bikeMaps)h+='<div class="directions-card"><div class="card-label">Bike route</div><div class="directions-text">'+s.bikeHint+'</div><a class="directions-link" href="'+s.bikeMaps+'" target="_blank">Full directions in Google Maps &#8599;</a></div>';
  h+='<div class="geo-status" id="geo-status">Locating you\u2026</div>';
  h+='<div class="reveal-section" id="reveal-arrival"><div class="arrival-banner"><div class="arr-label">You\'ve arrived at</div><div class="arr-name">'+s.name+'</div></div></div>';

  if(s.type==='fork'){
    h+='<div class="reveal-section" id="reveal-task"><div class="fork-card"><div class="card-label">Choose your route</div><div class="fork-title">Which way do you want to go?</div><div class="fork-btns"><button class="fork-btn" onclick="chooseLong()">Long route \uD83D\uDEB4<span class="fork-desc">More stops, more adventure, more beer.</span></button><button class="fork-btn" onclick="chooseShort()">Short route \u26A1<span class="fork-desc">Shorter, but just as sweet.</span></button></div></div></div>';
  } else if(s.farmersMarket){
    const open=isFMOpen();
    h+='<div class="reveal-section" id="reveal-task">'+(open?'<div class="task-card"><div class="card-label">Your task</div><div class="task-text">'+s.task+'</div></div>':'<div class="fm-unavail">The farmers market runs Saturdays 10am\u20132pm \u2014 looks like it\'s not open right now. Skip ahead!</div>')+'</div>';
    h+=s.nextClue?'<div class="reveal-section" id="reveal-next"><div class="next-clue-card"><div class="card-label">Clue to your next stop</div><div class="clue-text">'+s.nextClue.replace(/\n/g,'<br>')+'</div></div><button class="next-btn" onclick="nextStop()">Head out \u2192</button></div>':'<div class="reveal-section" id="reveal-next">'+finishHtml()+'</div>';
  } else if(s.optional){
    h+='<div class="reveal-section" id="reveal-task"><div class="optional-card"><div class="card-label">Optional stop</div><div class="optional-title">'+s.name+'</div><div class="optional-desc">'+s.optionalPrompt+'</div><div class="optional-btns"><button class="opt-btn" onclick="acceptOptional()">Yes, let\'s go! \uD83D\uDE4C</button><button class="opt-btn" onclick="skipOptional()">Skip it \u2192</button></div></div></div>';
  } else {
    h+='<div class="reveal-section" id="reveal-task"><div class="task-card"><div class="card-label">Your task</div><div class="task-text">'+s.task+'</div></div></div>';
    h+=s.nextClue?'<div class="reveal-section" id="reveal-next"><div class="next-clue-card"><div class="card-label">Clue to your next stop</div><div class="clue-text">'+s.nextClue.replace(/\n/g,'<br>')+'</div></div><button class="next-btn" onclick="nextStop()">Head out \u2192</button></div>':'<div class="reveal-section" id="reveal-next">'+finishHtml()+'</div>';
  }

  h+='<div class="manual-link" id="manual-link"><button onclick="manualUnlock()">I\'m here \u2014 unlock manually</button></div>';
  document.getElementById('stop-content').innerHTML=h;
  initMap(s.lat,s.lng);startGeo();window.scrollTo(0,0);
}

function finishHtml(){return '<div class="finish"><div class="emoji-row">\uD83C\uDF69\uD83C\uDF7A\uD83D\uDCDA\uD83D\uDEB4\u26B0\uFE0F</div><h2>You made it!</h2><p>You\'ve conquered the Bellingham scavenger hunt. Donuts, waterfalls, beer, books, a pump track, and a graveyard toast. Absolute legends.</p></div>';}

function chooseLong(){
  const fi=stops.findIndex(s=>s.id==='fork');
  stops=stops.slice(0,fi+1).concat(LONG);
  // immediately show Goods prompt
  const rt=document.getElementById('reveal-task');
  if(rt){
    const g=LONG[0];
    rt.innerHTML='<div class="optional-card"><div class="card-label">Optional stop \u2014 right now</div><div class="optional-title">'+g.name+'</div><div class="optional-desc">'+g.optionalPrompt+'</div><div class="optional-btns"><button class="opt-btn" onclick="acceptGoods()">\uD83C\uDF7A Yes, let\'s stop!</button><button class="opt-btn" onclick="skipGoods()">Skip it \u2192</button></div></div>';
    rt.classList.add('visible');
  }
}
function acceptGoods(){nextStop();}
function skipGoods(){stops=stops.filter(s=>s.id!=='goods');nextStop();}
function chooseShort(){const fi=stops.findIndex(s=>s.id==='fork');stops=stops.slice(0,fi+1).concat(SHORT);nextStop();}

function acceptOptional(){
  const s=stops[current];
  const rt=document.getElementById('reveal-task');
  if(rt)rt.innerHTML='<div class="task-card"><div class="card-label">Your task</div><div class="task-text">'+s.task+'</div></div>';
  const rn=document.getElementById('reveal-next');
  if(rn){rn.innerHTML=s.nextClue?'<div class="next-clue-card"><div class="card-label">Clue to your next stop</div><div class="clue-text">'+s.nextClue.replace(/\n/g,'<br>')+'</div></div><button class="next-btn" onclick="nextStop()">Head out \u2192</button>':finishHtml();rn.classList.add('visible');}
}
function skipOptional(){stops.splice(current,1);renderStop();}

function unlock(){
  if(unlocked)return;unlocked=true;
  const ml=document.getElementById('manual-link');if(ml)ml.style.display='none';
  setTimeout(()=>show('reveal-arrival'),0);
  setTimeout(()=>show('reveal-task'),700);
  const s=stops[current];
  if(s.type!=='fork'&&!s.optional)setTimeout(()=>show('reveal-next'),1400);
}
function show(id){const el=document.getElementById(id);if(el)el.classList.add('visible');}
function manualUnlock(){unlock();}
function nextStop(){if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}if(userMarker){userMarker.remove();userMarker=null;}current++;renderStop();}

function startGeo(){
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  if(!navigator.geolocation){setGeoStatus('Location unavailable \u2014 use manual unlock.','err');return;}
  watchId=navigator.geolocation.watchPosition(pos=>{
    const{latitude:la,longitude:lo}=pos.coords;updateUserOnMap(la,lo);
    if(!unlocked){const d=dist(la,lo,stops[current].lat,stops[current].lng);if(d<=RADIUS){setGeoStatus("You're here!",'close');unlock();}else setGeoStatus('About '+Math.round(d)+'m away\u2026','');}
  },()=>setGeoStatus('Location unavailable \u2014 use manual unlock.','err'),{enableHighAccuracy:true,maximumAge:5000});
}
function setGeoStatus(msg,cls){const el=document.getElementById('geo-status');if(el){el.textContent=msg;el.className='geo-status '+cls;}}

function initMap(lat,lng){
  if(map){map.remove();map=null;userMarker=null;}
  setTimeout(()=>{
    map=L.map('map',{zoomControl:true,attributionControl:false}).setView([lat,lng],15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
    const di=L.divIcon({html:'<div style="width:14px;height:14px;background:#c8622a;border-radius:50%;border:2.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,.35);"></div>',className:'',iconAnchor:[7,7]});
    L.marker([lat,lng],{icon:di}).addTo(map);
  },50);
}
function updateUserOnMap(lat,lng){
  if(!map)return;
  const ic=L.divIcon({html:'<div style="width:12px;height:12px;background:#3388ff;border-radius:50%;border:2.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>',className:'',iconAnchor:[6,6]});
  if(userMarker)userMarker.setLatLng([lat,lng]);else userMarker=L.marker([lat,lng],{icon:ic}).addTo(map);
}
function dist(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
</script>
